criteria:
  - name: "accuracy"
    description: "YouTube 영상 내용을 정확하게 반영하는가. 사실 오류나 과장이 없는가."
    weight: 0.25
    max_score: 5

  - name: "public_sector_relevance"
    description: "한국 공공기관 실무자 맥락에서 유용한가. 공공기관 활용 예시가 최소 1개 이상 있는가."
    weight: 0.25
    max_score: 5

  - name: "user_friendliness"
    description: "비전문가도 읽고 이해할 수 있는가. 기술 용어를 처음 등장 시 설명하는가."
    weight: 0.20
    max_score: 5

  - name: "structure"
    description: "## 섹션 구조가 명확하고, TL;DR 요약이 포함되어 있으며, 흐름이 자연스러운가."
    weight: 0.15
    max_score: 5

  - name: "korean_naturalness"
    description: |
      자연스러운 한국어인가. AI 상투어 없이 실용적인 문체인가.
      감점 표현: '살펴보겠습니다', '알아보겠습니다', '중요한 시사점', '주목할 만합니다',
      '핵심은 다음과 같습니다', 과도한 나열형 구조
    weight: 0.15
    max_score: 5

pass_threshold: 4.0
max_retries: 3
