name: Bids Classify

on:
  schedule:
    - cron: "30 0,3,6,9 * * *"  # UTC 0:30/3:30/6:30/9:30 → KST 9:30/12:30/15:30/18:30 (업무시간)
  workflow_dispatch:

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r ai-service/requirements.txt

      - name: Classify (OpenAI mini, active scope)
        working-directory: ai-service
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python bids/classify.py --provider openai --scope active
